<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
</style>

</head>

<body class="bg-[#f8f9ff] text-[#0b1c30] min-h-screen pb-32">

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 border-b bg-white flex justify-between items-center px-6 py-3">

<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#00355f]">visibility</span>
<h1 class="text-xl font-extrabold text-[#00355f]">OptiControl</h1>
</div>

<div class="flex gap-6">
<a href="inicio.html" class="text-[#00355f] font-bold">Dashboard</a>
<a href="pacientes.html" class="text-gray-500 hover:text-[#00355f]">Patients</a>
<a href="agenda.html" class="text-gray-500 hover:text-[#00355f]">Agenda</a>
</div>

</header>

<!-- CONTENIDO -->
<main class="pt-24 px-6 max-w-7xl mx-auto">

<h2 class="text-2xl font-bold mb-4">Historia Clínica</h2>

<form id="formHistoria" class="grid grid-cols-1 lg:grid-cols-2 gap-6">

<!-- OJO DERECHO -->
<div class="bg-white p-4 rounded-xl border">
<h3 class="font-bold mb-2">Ojo Derecho (OD)</h3>

<input id="od_sph" placeholder="SPH" class="w-full border p-2 mb-2"/>
<input id="od_cyl" placeholder="CYL" class="w-full border p-2 mb-2"/>
<input id="od_axis" placeholder="AXIS" class="w-full border p-2"/>

</div>

<!-- OJO IZQUIERDO -->
<div class="bg-white p-4 rounded-xl border">
<h3 class="font-bold mb-2">Ojo Izquierdo (OI)</h3>

<input id="oi_sph" placeholder="SPH" class="w-full border p-2 mb-2"/>
<input id="oi_cyl" placeholder="CYL" class="w-full border p-2 mb-2"/>
<input id="oi_axis" placeholder="AXIS" class="w-full border p-2"/>

</div>

<!-- DIAGNOSTICO -->
<div class="lg:col-span-2 bg-white p-4 rounded-xl border">
<h3 class="font-bold mb-2">Diagnóstico</h3>
<textarea id="diagnostico" class="w-full border p-2"></textarea>
</div>

<!-- RECETA -->
<div class="lg:col-span-2 bg-white p-4 rounded-xl border">
<h3 class="font-bold mb-2">Receta</h3>
<textarea id="receta" class="w-full border p-2"></textarea>
</div>

<!-- BOTONES -->
<div class="lg:col-span-2 flex gap-4">

<button type="submit" id="btnGuardar" class="bg-[#00355f] text-white px-6 py-2 rounded">
Guardar
</button>

<button type="button" id="btnCancelar" class="border px-6 py-2 rounded">
Cancelar
</button>

<button type="button" id="btnWhatsApp" class="bg-green-500 text-white px-6 py-2 rounded">
Enviar WhatsApp
</button>

</div>

</form>

</main>

<!-- FOOTER -->
<footer class="footer text-center py-4 text-gray-500"></footer>

<!-- SCRIPT -->
<script>

// VERSION
const version = "0.0.5";
document.querySelector(".footer").innerHTML =
  `by CORPORACIÓN 360 | V.${version}`;

// GUARDAR
document.getElementById("formHistoria").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        od: {
            sph: document.getElementById("od_sph").value,
            cyl: document.getElementById("od_cyl").value,
            axis: document.getElementById("od_axis").value
        },
        oi: {
            sph: document.getElementById("oi_sph").value,
            cyl: document.getElementById("oi_cyl").value,
            axis: document.getElementById("oi_axis").value
        },
        diagnostico: document.getElementById("diagnostico").value,
        receta: document.getElementById("receta").value
    };

    localStorage.setItem("historiaClinica", JSON.stringify(data));

    alert("Historia guardada correctamente ✅");
});

// CANCELAR
document.getElementById("btnCancelar").addEventListener("click", () => {
    document.getElementById("formHistoria").reset();
});

// WHATSAPP
document.getElementById("btnWhatsApp").addEventListener("click", () => {

    const mensaje = `Hola, su diagnóstico está listo en OptiControl`;

    const numero = "593XXXXXXXXX"; // TU NUMERO

    const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;

    window.open(url, "_blank");

});

</script>

</body>
</html>
