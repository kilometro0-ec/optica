<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Historia Clínica | ÓPTICA'S GM</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <link rel="stylesheet" href="estilos.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#1A8D8C",
                        secondary: "#6C247B",
                        background: "#f8f9ff",
                        surface: "#ffffff"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-[#0b1c30] min-h-screen pb-32">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-white border-b border-slate-100 shadow-sm">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary text-3xl">visibility</span>
        <h1 class="font-manrope font-extrabold text-xl tracking-tighter uppercase bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
            ÓPTICA'S GM
        </h1>
    </div>
    <div class="h-9 w-9 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
        <span class="material-symbols-outlined text-primary text-sm">person</span>
    </div>
</header>

<main class="pt-24 px-6 max-w-4xl mx-auto">

    <section class="mb-8">
        <div class="flex items-center gap-2 mb-1">
            <span class="h-0.5 w-6 bg-primary rounded-full"></span>
            <p class="text-[10px] font-black text-secondary uppercase tracking-[0.3em]">Consulta Médica</p>
        </div>
        <h2 class="text-3xl font-extrabold font-manrope tracking-tight">Mateo Richardson</h2>
        <p class="text-slate-500 text-sm">C.I.: 172XXXXXXX | Última visita: 12 Oct 2025</p>
    </section>

    <form id="formHistoria" class="space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary">visibility</span>
                    <h3 class="font-bold text-primary uppercase text-xs tracking-widest">Ojo Derecho (OD)</h3>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">SPH</label>
                        <input id="od_sph" type="text" placeholder="-0.00" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20"/>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">CYL</label>
                        <input id="od_cyl" type="text" placeholder="-0.00" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20"/>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">AXIS</label>
                        <input id="od_axis" type="text" placeholder="0°" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-primary/20"/>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-secondary">visibility</span>
                    <h3 class="font-bold text-secondary uppercase text-xs tracking-widest">Ojo Izquierdo (OI)</h3>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">SPH</label>
                        <input id="oi_sph" type="text" placeholder="-0.00" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-secondary/20"/>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">CYL</label>
                        <input id="oi_cyl" type="text" placeholder="-0.00" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-secondary/20"/>
                    </div>
                    <div>
                        <label class="text-[9px] font-bold text-slate-400 uppercase ml-1">AXIS</label>
                        <input id="oi_axis" type="text" placeholder="0°" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-secondary/20"/>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
            <h3 class="font-bold mb-3 text-primary uppercase text-xs tracking-widest">Diagnóstico Clínico</h3>
            <textarea id="diagnostico" rows="3" placeholder="Ej: Miopía con Astigmatismo..." class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-primary/20"></textarea>
        </div>

        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
            <h3 class="font-bold mb-3 text-secondary uppercase text-xs tracking-widest">Recomendaciones / Receta</h3>
            <textarea id="receta" rows="3" placeholder="Ej: Lentes con filtro Blue Defense y AR..." class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-secondary/20"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <button type="submit" class="bg-primary text-white font-bold py-4 rounded-2xl shadow-lg shadow-teal-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span class="material-symbols-outlined">save</span> GUARDAR HISTORIA
            </button>
            <button type="button" id="btnWhatsApp" class="bg-green-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-green-100 flex items-center justify-center gap-2 active:scale-95 transition-all">
                <span class="material-symbols-outlined">chat</span> ENVIAR POR WA
            </button>
            <button type="button" id="btnCancelar" class="bg-white text-slate-400 font-bold py-4 rounded-2xl border border-slate-100 hover:bg-slate-50 transition-all">
                CANCELAR
            </button>
        </div>

    </form>
</main>

<script>
    const version = "0.0.6";
    document.querySelector(".footer").innerHTML = `by CORPORACIÓN 360 | V.${version}`;

    // GUARDAR EN LOCALSTORAGE
    document.getElementById("formHistoria").addEventListener("submit", function(e){
        e.preventDefault();
        const data = {
            od: { sph: od_sph.value, cyl: od_cyl.value, axis: od_axis.value },
            oi: { sph: oi_sph.value, cyl: oi_cyl.value, axis: oi_axis.value },
            diagnostico: diagnostico.value,
            receta: receta.value,
            fecha: new Date().toLocaleDateString()
        };
        localStorage.setItem("ultima_historia", JSON.stringify(data));
        alert("✅ Historia Guardada con éxito");
    });

    // BOTÓN CANCELAR
    document.getElementById("btnCancelar").onclick = () => {
        if(confirm("¿Seguro que deseas limpiar los campos?")) formHistoria.reset();
    };

    // WHATSAPP DINÁMICO
    document.getElementById("btnWhatsApp").onclick = () => {
        const msg = `Hola Mateo, tu diagnóstico en ÓPTICA'S GM está listo.\nOD: ${od_sph.value} ${od_cyl.value}\nOI: ${oi_sph.value} ${oi_cyl.value}\nReceta: ${receta.value}`;
        window.open(`https://wa.me/593XXXXXXXXX?text=${encodeURIComponent(msg)}`);
    };
</script>

<script src="nav-component.js"></script
