<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Historia Clínica | ÓPTICA'S GM</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
    <link rel="stylesheet" href="estilos.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#1A8D8C",
                        secondary: "#6C247B",
                        background: "#f8f9ff"
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-[#0b1c30] min-h-screen pb-40">

<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-white border-b border-slate-100 shadow-sm">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary text-3xl">visibility</span>
        <h1 class="font-manrope font-extrabold text-xl tracking-tighter uppercase bg-gradient-to-r from-primary to-secondary bg-clip-text text-transparent">
            ÓPTICA'S GM
        </h1>
    </div>
    <div class="h-9 w-9 rounded-full bg-primary/10 flex items-center justify-center border border-primary/20">
        <span class="material-symbols-outlined text-primary text-sm">person</span>
    </div>
</header>

<main class="pt-24 px-6 max-w-4xl mx-auto">

    <section class="mb-8">
        <div class="flex items-center gap-2 mb-1">
            <span class="h-0.5 w-6 bg-primary rounded-full"></span>
            <p class="text-[10px] font-black text-secondary uppercase tracking-[0.3em]">Consulta Médica</p>
        </div>
        <h2 id="nombre-paciente" class="text-3xl font-extrabold font-manrope tracking-tight text-slate-800">Cargando paciente...</h2>
        <p id="info-paciente" class="text-slate-500 text-sm">Registro de examen visual</p>
    </section>

    <form id="formHistoria" class="space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-50 shadow-sm">
                <h3 class="font-bold text-primary uppercase text-[10px] tracking-widest mb-4 flex items-center gap-2">
                    <span class="h-2 w-2 bg-primary rounded-full"></span> Ojo Derecho (OD)
                </h3>
                <div class="grid grid-cols-3 gap-3">
                    <input id="od_sph" placeholder="SPH" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center font-bold text-slate-700 focus:ring-2 focus:ring-primary/20">
                    <input id="od_cyl" placeholder="CYL" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center font-bold text-slate-700 focus:ring-2 focus:ring-primary/20">
                    <input id="od_axis" placeholder="AXIS" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center font-bold text-slate-700 focus:ring-2 focus:ring-primary/20">
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-50 shadow-sm">
                <h3 class="font-bold text-secondary uppercase text-[10px] tracking-widest mb-4 flex items-center gap-2">
                    <span class="h-2 w-2 bg-secondary rounded-full"></span> Ojo Izquierdo (OI)
                </h3>
                <div class="grid grid-cols-3 gap-3">
                    <input id="oi_sph" placeholder="SPH" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center font-bold text-slate-700 focus:ring-2 focus:ring-secondary/20">
                    <input id="oi_cyl" placeholder="CYL" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center font-bold text-slate-700 focus:ring-2 focus:ring-secondary/20">
                    <input id="oi_axis" placeholder="AXIS" class="w-full bg-slate-50 border-none rounded-2xl p-4 text-center font-bold text-slate-700 focus:ring-2 focus:ring-secondary/20">
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-50 shadow-sm">
            <h3 class="font-bold mb-3 text-slate-400 uppercase text-[10px] tracking-widest">Diagnóstico y Receta</h3>
            <textarea id="diagnostico" rows="2" placeholder="Diagnóstico..." class="w-full bg-slate-50 border-none rounded-2xl p-4 mb-4 text-sm focus:ring-2 focus:ring-primary/10"></textarea>
            <textarea id="receta" rows="2" placeholder="Indicaciones de la receta..." class="w-full bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-secondary/10"></textarea>
        </div>

        <div class="flex flex-col gap-3">
            <button type="submit" class="w-full py-5 bg-primary text-white rounded-[1.5rem] font-bold text-sm uppercase tracking-widest shadow-lg shadow-teal-100 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">save</span> Guardar Historia
            </button>
            <button type="button" id="btnWhatsApp" class="w-full py-4 bg-emerald-500 text-white rounded-[1.5rem] font-bold text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">chat_bubble</span> Enviar WA
            </button>
        </div>
    </form>
</main>

<script>
    // Cargar datos del paciente actual si existen
    document.addEventListener('DOMContentLoaded', () => {
        const paciente = JSON.parse(localStorage.getItem('paciente_actual'));
        if(paciente) {
            document.getElementById('nombre-paciente').innerText = paciente.nombre;
            document.getElementById('info-paciente').innerText = `C.I: ${paciente.cedula} | Tel: ${paciente.telefono}`;
        }
    });

    document.getElementById("formHistoria").onsubmit = (e) => {
        e.preventDefault();
        alert("✅ Historia clínica guardada correctamente.");
    };

    document.getElementById("btnWhatsApp").onclick = () => {
        const nombre = document.getElementById('nombre-paciente').innerText;
        const msg = `Hola ${nombre}, tu examen visual en ÓPTICA'S GM ha sido registrado.`;
        window.open(`https://wa.me/593XXXXXXXXX?text=${encodeURIComponent(msg)}`);
    };
</script>

<script src="nav-component.js"></script>

</body>
</html>
