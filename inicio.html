<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OptiControl</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Tus estilos -->
<link rel="stylesheet" href="estilos.css">

</head>

<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- HEADER -->
<header class="fixed top-0 w-full bg-white shadow flex justify-between items-center px-6 py-3">
  <h1 class="text-xl font-bold text-blue-900">OptiControl</h1>
</header>

<!-- CONTENIDO -->
<main class="flex-1 pt-20 pb-24 px-6">

  <h2 class="text-2xl font-bold mb-4">Panel Principal</h2>

  <div class="grid gap-4">

    <button onclick="irPacientes()" class="bg-green-600 text-white p-4 rounded-lg">
      Pacientes
    </button>

    <button onclick="irAgenda()" class="bg-purple-600 text-white p-4 rounded-lg">
      Agenda
    </button>

    <button onclick="irHistorias()" class="bg-blue-600 text-white p-4 rounded-lg">
      Historias Clínicas
    </button>

    <button onclick="irOrdenes()" class="bg-orange-600 text-white p-4 rounded-lg">
      Órdenes
    </button>

  </div>

</main>

<!-- FOOTER -->
<footer class="footer"></footer>

<!-- SCRIPTS -->
<script src="api-config.js"></script>
<script src="app.js"></script>

<script>
// FUNCIONES DE NAVEGACIÓN
function irPacientes() {
  window.location.href = "pacientes.html";
}

function irAgenda() {
  window.location.href = "agenda.html";
}

function irHistorias() {
  window.location.href = "historias.html";
}

function irOrdenes() {
  window.location.href = "ordenes.html";
}
</script>

</body>
</html>
