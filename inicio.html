<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OptiControl</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- COLORES PERSONALIZADOS -->
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#6A1B9A",
        secondary: "#2E8B7D",
        background: "#f5f5f5",
        surface: "#ffffff",
        "on-surface": "#1f2937"
      }
    }
  }
}
</script>

<link rel="stylesheet" href="estilos.css">

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
.font-manrope { font-family: 'Manrope', sans-serif; }
</style>

</head>

<body class="bg-background text-on-surface min-h-screen flex flex-col">

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-white border-b">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl">visibility</span>
<h1 class="text-xl font-extrabold text-primary font-manrope">OptiControl</h1>
</div>
</header>

<!-- SIDEBAR -->
<aside class="hidden md:flex fixed left-0 top-0 h-full w-72 bg-white border-r flex-col p-6 pt-20">

<nav class="space-y-2 flex-1">
<a href="inicio.html" class="flex items-center gap-3 px-4 py-3 bg-primary text-white rounded-xl">
Dashboard
</a>
<a href="pacientes.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
Pacientes
</a>
<a href="historias.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
Historias
</a>
<a href="agenda.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
Agenda
</a>
<a href="ordenes.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-xl">
Órdenes
</a>
</nav>

</aside>

<!-- MAIN -->
<main class="flex-1 md:ml-72 pt-20 pb-24 px-6">

<section class="flex justify-between items-center mb-6">
<h1 class="text-2xl font-bold">Panel Principal</h1>

<div class="flex gap-3">
<button onclick="irPacientes()" class="bg-primary text-white px-4 py-2 rounded-lg">
Nuevo Paciente
</button>
<button onclick="irAgenda()" class="border px-4 py-2 rounded-lg">
Agendar
</button>
</div>
</section>

<div class="grid grid-cols-1 md:grid-cols-2 gap-4">

<div class="bg-white p-4 rounded-lg shadow">
<h3 class="font-bold mb-2">Citas Hoy</h3>
<p>12 citas programadas</p>
</div>

<div class="bg-white p-4 rounded-lg shadow">
<h3 class="font-bold mb-2">Órdenes</h3>
<p>18 pendientes</p>
</div>

</div>

</main>

<!-- FOOTER -->
<footer class="footer"></footer>

<!-- SCRIPTS -->
<script src="api-config.js"></script>
<script src="app.js"></script>

<script>
function irPacientes(){ window.location.href="pacientes.html"; }
function irAgenda(){ window.location.href="agenda.html"; }
function irHistorias(){ window.location.href="historias.html"; }
function irOrdenes(){ window.location.href="ordenes.html"; }
</script>

</body>
</html>
