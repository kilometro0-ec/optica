<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OptiControl</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Tus estilos -->
<link rel="stylesheet" href="estilos.css">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
body { font-family: 'Inter', sans-serif; }
.font-manrope { font-family: 'Manrope', sans-serif; }
</style>

</head>

<body class="bg-surface text-on-background min-h-screen flex flex-col">

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-white border-b">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-900">visibility</span>
<h1 class="text-xl font-extrabold text-blue-900 font-manrope">OptiControl</h1>
</div>
</header>

<!-- SIDEBAR -->
<aside class="hidden md:flex fixed left-0 top-0 h-full w-72 bg-white border-r flex-col p-6 pt-20">

<nav class="space-y-2">
<a href="inicio.html" class="block p-3 bg-blue-100 rounded">Dashboard</a>
<a href="pacientes.html" class="block p-3 hover:bg-gray-100 rounded">Pacientes</a>
<a href="historias.html" class="block p-3 hover:bg-gray-100 rounded">Historias</a>
<a href="agenda.html" class="block p-3 hover:bg-gray-100 rounded">Agenda</a>
<a href="ordenes.html" class="block p-3 hover:bg-gray-100 rounded">Órdenes</a>
</nav>

</aside>

<!-- CONTENIDO -->
<main class="flex-1 md:ml-72 pt-20 pb-24 px-6">

<h1 class="text-2xl font-bold mb-4">Panel Principal</h1>

<div class="grid gap-4">

<button onclick="irPacientes()" class="bg-green-600 text-white p-4 rounded-lg">
Pacientes
</button>

<button onclick="irAgenda()" class="bg-purple-600 text-white p-4 rounded-lg">
Agenda
</button>

<button onclick="irHistorias()" class="bg-blue-600 text-white p-4 rounded-lg">
Historias Clínicas
</button>

<button onclick="irOrdenes()" class="bg-orange-600 text-white p-4 rounded-lg">
Órdenes
</button>

</div>

</main>

<!-- FOOTER -->
<footer class="footer"></footer>

<!-- SCRIPTS -->
<script src="api-config.js"></script>
<script src="app.js"></script>

<script>
function irPacientes(){ window.location.href="pacientes.html"; }
function irAgenda(){ window.location.href="agenda.html"; }
function irHistorias(){ window.location.href="historias.html"; }
function irOrdenes(){ window.location.href="ordenes.html"; }
</script>

</body>
</html>
