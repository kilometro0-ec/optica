<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Órdenes de Trabajo | Sistema Óptico</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#1A8D8C",
                        "secondary": "#6C247B",
                        "surface": "#f8f9ff",
                        "on-surface": "#0b1c30"
                    },
                    fontFamily: {
                        "manrope": ["Manrope", "sans-serif"],
                        "inter": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>

    <style>
        .order-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Animación para botones activos */
        .btn-filter-active {
            background-color: #1A8D8C !important;
            color: white !important;
        }
    </style>
</head>

<body class="bg-surface font-inter text-on-surface antialiased">

<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-3 bg-white border-b border-slate-100 shadow-sm">
    <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-primary text-3xl">visibility</span>
        <span id="app-name" class="text-xl font-extrabold text-primary font-manrope tracking-tight uppercase">VisionCare</span>
    </div>
    <div class="flex items-center gap-4">
        <button onclick="focoBuscador()" class="p-2 rounded-full hover:bg-slate-50 transition-colors text-slate-400">
            <span class="material-symbols-outlined">search</span>
        </button>
        <div class="w-9 h-9 rounded-full bg-slate-100 border border-primary/10 flex items-center justify-center overflow-hidden cursor-pointer" onclick="alert('Perfil de usuario')">
            <span class="material-symbols-outlined text-primary text-xl">account_circle</span>
        </div>
    </div>
</header>

<main class="px-6 pt-24 pb-32 max-w-7xl mx-auto">
    <div class="mb-10">
        <h1 class="text-3xl font-extrabold font-manrope text-slate-800 mb-2">Gestión de Órdenes</h1>
        <p class="text-slate-500 text-sm">Control de laboratorios y despachos de pacientes.</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-8">
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center cursor-pointer hover:bg-slate-50 transition-colors">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Activas</p>
                    <p class="text-3xl font-black text-primary mt-1">24</p>
                </div>
                <div class="w-12 h-12 rounded-2xl bg-teal-50 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined">pending_actions</span>
                </div>
            </div>
            </div>
    </div>

    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-8 bg-white p-3 rounded-2xl border border-slate-100 shadow-sm">
        <div id="filtro-contenedor" class="flex items-center gap-2 overflow-x-auto pb-2 lg:pb-0 scrollbar-hide">
            <button onclick="aplicarFiltro(this)" class="px-5 py-2 bg-primary text-white rounded-xl text-xs font-bold whitespace-nowrap btn-filter-active">Todas</button>
            <button onclick="aplicarFiltro(this)" class="px-5 py-2 bg-slate-50 text-slate-500 rounded-xl text-xs font-bold whitespace-nowrap hover:bg-slate-100">En Laboratorio</button>
            <button onclick="aplicarFiltro(this)" class="px-5 py-2 bg-slate-50 text-slate-500 rounded-xl text-xs font-bold whitespace-nowrap hover:bg-slate-100">Para Entrega</button>
        </div>
        <div class="relative min-w-[280px]">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
            <input id="input-busqueda" onkeyup="buscarOrden()" class="w-full pl-10 pr-4 py-2.5 rounded-xl border-none bg-slate-50 focus:ring-2 focus:ring-primary/20 text-sm" placeholder="Buscar por ID o Paciente..." type="text"/>
        </div>
    </div>

    <div id="lista-ordenes" class="order-card-grid">
        <div class="bg-white rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all overflow-hidden flex flex-col group">
            <div class="p-6 border-b border-slate-50">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] font-black text-secondary tracking-[0.15em] uppercase">#ORD-2931</span>
                    <span class="px-3 py-1 bg-teal-50 text-primary text-[10px] font-bold rounded-full uppercase">En Proceso</span>
                </div>
                <h3 class="text-xl font-bold text-slate-800">Eleanor Fant</h3>
            </div>
            
            <div class="p-6 flex-1 space-y-4">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-slate-400">lens</span>
                    <div class="text-xs text-slate-600">Monofocal, Antireflex</div>
                </div>

                <div class="mt-4 border-t border-dashed border-slate-100 pt-4">
                    <details class="group">
                        <summary class="flex items-center justify-between cursor-pointer list-none text-[10px] font-bold text-primary uppercase">
                            Especificaciones
                            <span class="material-symbols-outlined text-sm transition-transform group-open:rotate-180">expand_more</span>
                        </summary>
                        <div class="mt-3 grid grid-cols-2 gap-2">
                            <div class="bg-slate-50 p-2 rounded-xl text-[10px] text-center font-bold">-2.75 OD</div>
                            <div class="bg-slate-50 p-2 rounded-xl text-[10px] text-center font-bold">-3.00 OI</div>
                        </div>
                    </details>
                </div>
            </div>

            <div class="px-6 py-4 bg-slate-50/50 flex items-center justify-between">
                <button onclick="alert('Imprimiendo Ticket...')" class="text-slate-400 font-bold text-[10px] uppercase flex items-center gap-1 hover:text-primary transition-colors">
                    <span class="material-symbols-outlined text-sm">print</span> Ticket
                </button>
                <button onclick="alert('Mostrando Historial de Eleanor')" class="text-primary font-bold text-[10px] uppercase hover:underline">Ver Historial</button>
            </div>
        </div>
    </div>
</main>

<button onclick="alert('Nueva Orden: Abriendo formulario...')" class="fixed bottom-24 right-6 w-14 h-14 bg-primary text-white rounded-full shadow-xl shadow-primary/30 flex items-center justify-center active:scale-90 transition-transform z-40">
    <span class="material-symbols-outlined text-2xl">add_shopping_cart</span>
</button>

<script>
    // 1. Función para los filtros de estado
    function aplicarFiltro(elemento) {
        // Quitar clase activa de todos los botones
        document.querySelectorAll('#filtro-contenedor button').forEach(btn => {
            btn.classList.remove('btn-filter-active', 'bg-primary', 'text-white');
            btn.classList.add('bg-slate-50', 'text-slate-500');
        });
        // Agregar clase activa al actual
        elemento.classList.add('btn-filter-active');
        console.log("Filtrando por: " + elemento.innerText);
    }

    // 2. Función de búsqueda
    function buscarOrden() {
        let input = document.getElementById('input-busqueda').value.toLowerCase();
        console.log("Buscando: " + input);
        // Aquí podrías filtrar las tarjetas reales ocultándolas con .style.display
    }

    function focoBuscador() {
        document.getElementById('input-busqueda').focus();
    }

    // 3. Simulación de notificaciones
    function notificarPaciente(nombre) {
        if(confirm("¿Enviar notificación de WhatsApp a " + nombre + "?")) {
            alert("Mensaje enviado con éxito ✅");
        }
    }
</script>

<script src="api-config.js"></script>
<script src="app.js"></script>
<script src="nav-component.js"></script>

</body>
</html>
